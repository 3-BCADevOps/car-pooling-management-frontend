# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Deploy React to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8365620ADBEE4398A3C328A4FC1D8B03 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3694E258B5F14CFD8030A2FB6986EB14 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A47899ABD40C4D4A96BA9C6D3ECACE28 }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: carpoolmanagement-frontend
          package: ./build